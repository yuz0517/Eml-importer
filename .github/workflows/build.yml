name: Build EML_Importer_v2.exe

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 빌드
        run: |
          pip install pyinstaller
          pyinstaller --onefile --windowed --name "EML_Importer_v2" eml_importer.py

      - name: 태그 생성 (수동 실행 시)
        if: github.ref_type != 'tag'
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git tag v2.0.${{ github.run_number }}
          git push origin v2.0.${{ github.run_number }}
        shell: bash

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v2.0.{0}', github.run_number) }}
          name: "EML Importer ${{ github.ref_type == 'tag' && github.ref_name || format('v2.0.{0}', github.run_number) }}"
          body: |
            ## EML → Outlook 일괄 가져오기 v2
            PowerShell COM 방식 — Outlook 보안 설정 우회 버전
            Python 설치 불필요, 더블클릭으로 바로 실행
          files: dist/EML_Importer_v2.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
